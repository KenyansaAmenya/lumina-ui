<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaLearn - AI Tutor</title>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?display=swap&family=Inter:wght@400;500;700;900&family=Noto+Sans:wght@400;500;700;900" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Inter, "Noto Sans", sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(1, 152, 99, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(1, 152, 99, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(1, 152, 99, 0);
            }
        }

        .typing-indicator::after {
            content: '...';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '';
            }

            40% {
                content: '.';
            }

            60% {
                content: '..';
            }

            80%,
            100% {
                content: '...';
            }
        }
    </style>
</head>

<body class="bg-[#f8fcfa] min-h-screen">
    <div class="layout-container flex h-full grow flex-col">
        <!-- Header -->
        <header
            class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-[#e6f4ef] px-10 py-3 bg-white">
            <div class="flex items-center gap-4 text-[#0c1c17]">
                <div class="size-8 text-[#019863]">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 4L4 14v20l20 10 20-10V14L24 4z" fill="currentColor" opacity="0.2" />
                        <path d="M24 4L4 14v20l20 10 20-10V14L24 4z" stroke="currentColor" stroke-width="3"
                            fill="none" />
                        <path d="M24 14v20M14 19l10-5 10 5M14 29l10 5 10-5" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                </div>
                <h2 class="text-[#0c1c17] text-xl font-bold tracking-tight">LuminaLearn</h2>
                <span class="text-xs bg-[#e6f4ef] text-[#019863] px-2 py-1 rounded-full font-medium">AI Tutor</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="teacher-dashboard.html" class="text-sm text-[#46a080] hover:text-[#019863] font-medium">Teacher
                    Dashboard</a>
                <div class="flex items-center gap-2 bg-[#e6f4ef] rounded-full px-3 py-1.5">
                    <div class="w-2 h-2 bg-[#019863] rounded-full pulse-ring"></div>
                    <span class="text-xs font-medium text-[#0c1c17]" id="student-name">Student</span>
                </div>
                <button onclick="toggleTheme()"
                    class="p-2 text-[#0c1c17] hover:bg-[#e6f4ef] rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20px" height="20px" fill="currentColor"
                        viewBox="0 0 256 256">
                        <path
                            d="M120,40V16a8,8,0,0,1,16,0V40a8,8,0,0,1-16,0Zm72,88a64,64,0,1,1-64-64A64.07,64.07,0,0,1,192,128Zm-16,0a48,48,0,1,0-48,48A48.05,48.05,0,0,0,176,128ZM58.34,69.66A8,8,0,0,0,69.66,58.34l-16-16A8,8,0,0,0,42.34,53.66Zm0,116.68-16,16a8,8,0,0,0,11.32,11.32l16-16a8,8,0,0,0-11.32-11.32ZM192,72a8,8,0,0,0,5.66-2.34l16-16a8,8,0,0,0-11.32-11.32l-16,16A8,8,0,0,0,192,72Zm5.66,114.34a8,8,0,0,0-11.32,11.32l16,16a8,8,0,0,0,11.32-11.32ZM48,128a8,8,0,0,0-8-8H16a8,8,0,0,0,0,16H40A8,8,0,0,0,48,128Zm80,80a8,8,0,0,0-8,8v24a8,8,0,0,0,16,0V216A8,8,0,0,0,128,208Zm112-88H216a8,8,0,0,0,0,16h24a8,8,0,0,0,0-16Z" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="flex flex-1 justify-center py-8 px-4">
            <div class="w-full max-w-[960px] flex flex-col gap-6">

                <!-- Welcome Section -->
                <div class="text-center fade-in" id="welcome-section">
                    <h1 class="text-[#0c1c17] text-[32px] font-bold leading-tight mb-2">
                        Hi, <span id="welcome-name">Learner</span>! Ready to learn?
                    </h1>
                    <p class="text-[#46a080] text-lg">Choose a topic or let me generate a question for you</p>
                </div>

                <!-- Topic Selection -->
                <div class="flex flex-wrap justify-center gap-3 fade-in" style="animation-delay: 0.1s">
                    <button onclick="selectTopic('Mathematics')"
                        class="topic-btn flex items-center gap-2 px-5 py-3 bg-[#e6f4ef] text-[#0c1c17] rounded-full hover:bg-[#cde9df] transition-all font-medium border-2 border-transparent hover:border-[#019863]">
                        <span>📐</span> Mathematics
                    </button>
                    <button onclick="selectTopic('Science')"
                        class="topic-btn flex items-center gap-2 px-5 py-3 bg-[#e6f4ef] text-[#0c1c17] rounded-full hover:bg-[#cde9df] transition-all font-medium border-2 border-transparent hover:border-[#019863]">
                        <span>🔬</span> Science
                    </button>
                    <button onclick="selectTopic('History')"
                        class="topic-btn flex items-center gap-2 px-5 py-3 bg-[#e6f4ef] text-[#0c1c17] rounded-full hover:bg-[#cde9df] transition-all font-medium border-2 border-transparent hover:border-[#019863]">
                        <span>📚</span> History
                    </button>
                    <button onclick="selectTopic('Programming')"
                        class="topic-btn flex items-center gap-2 px-5 py-3 bg-[#e6f4ef] text-[#0c1c17] rounded-full hover:bg-[#cde9df] transition-all font-medium border-2 border-transparent hover:border-[#019863]">
                        <span>💻</span> Programming
                    </button>
                    <button onclick="selectTopic('Custom')"
                        class="topic-btn flex items-center gap-2 px-5 py-3 bg-[#019863] text-white rounded-full hover:bg-[#017a4f] transition-all font-medium">
                        <span>✨</span> AI Generate
                    </button>
                </div>

                <!-- Custom Topic Input -->
                <div id="custom-topic-section" class="hidden flex justify-center fade-in">
                    <div class="flex gap-2 w-full max-w-md">
                        <input type="text" id="custom-topic"
                            placeholder="Enter any topic (e.g., 'Ancient Rome', 'Python')..."
                            class="flex-1 px-4 py-3 rounded-xl border border-[#cde9df] bg-white focus:border-[#019863] focus:outline-none text-[#0c1c17]">
                        <button onclick="generateCustomQuestion()"
                            class="px-6 py-3 bg-[#019863] text-white rounded-xl font-bold hover:bg-[#017a4f] transition-colors">
                            Go
                        </button>
                    </div>
                </div>

                <!-- Quiz Card -->
                <div id="quiz-card" class="hidden bg-white rounded-2xl shadow-lg border border-[#e6f4ef] p-8 fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-2">
                            <span id="quiz-topic-badge"
                                class="bg-[#e6f4ef] text-[#019863] px-3 py-1 rounded-full text-sm font-bold">Mathematics</span>
                            <span id="quiz-difficulty" class="text-[#46a080] text-sm font-medium">Medium</span>
                        </div>
                        <div class="flex items-center gap-2 text-[#46a080]">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                viewBox="0 0 256 256">
                                <path
                                    d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm64-88a8,8,0,0,1-8,8H128a8,8,0,0,1-8-8V72a8,8,0,0,1,16,0v48h48A8,8,0,0,1,192,128Z" />
                            </svg>
                            <span id="timer" class="font-mono font-bold">00:00</span>
                        </div>
                    </div>

                    <h3 id="question-text" class="text-[#0c1c17] text-xl font-bold mb-6 leading-relaxed">
                        Loading question...
                    </h3>

                    <!-- Options -->
                    <div id="options-container" class="grid gap-3 mb-6">
                        <!-- Options injected by JS -->
                    </div>

                    <!-- Hint Button -->
                    <button onclick="getHint()" id="hint-btn"
                        class="text-[#46a080] text-sm font-medium hover:text-[#019863] flex items-center gap-1 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            viewBox="0 0 256 256">
                            <path
                                d="M140,128a12,12,0,1,1-12-12A12,12,0,0,1,140,128ZM128,72a12,12,0,1,0-12,12A12,12,0,0,0,128,72Zm0,104a12,12,0,1,0,12,12A12,12,0,0,0,128,176Zm104-48A104,104,0,1,1,128,24,104.11,104.11,0,0,1,232,128Zm-16,0a88,88,0,1,0-88,88A88.1,88.1,0,0,0,216,128Z" />
                        </svg>
                        Need a hint?
                    </button>
                    <div id="hint-display"
                        class="hidden bg-[#f8fcfa] border-l-4 border-[#019863] p-4 mb-4 text-[#0c1c17] text-sm italic">
                    </div>

                    <!-- Submit Button -->
                    <button onclick="submitAnswer()" id="submit-btn" disabled
                        class="w-full py-4 bg-[#019863] text-white rounded-xl font-bold text-lg hover:bg-[#017a4f] disabled:bg-[#cde9df] disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2">
                        Submit Answer
                    </button>
                </div>

                <!-- Feedback Section -->
                <div id="feedback-section" class="hidden fade-in">
                    <div id="feedback-card" class="rounded-2xl p-8 mb-6 border-2">
                        <div class="flex items-center gap-3 mb-4">
                            <div id="feedback-icon" class="text-4xl"></div>
                            <h3 id="feedback-title" class="text-2xl font-bold"></h3>
                        </div>
                        <div id="ai-feedback" class="text-[#0c1c17] leading-relaxed mb-6 text-lg"></div>

                        <div class="flex gap-3">
                            <button onclick="nextQuestion()"
                                class="flex-1 py-3 bg-[#019863] text-white rounded-xl font-bold hover:bg-[#017a4f] transition-colors">
                                Next Question
                            </button>
                            <button onclick="showExplanation()"
                                class="flex-1 py-3 bg-[#e6f4ef] text-[#0c1c17] rounded-xl font-bold hover:bg-[#cde9df] transition-colors">
                                Detailed Explanation
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Progress Stats -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 fade-in" style="animation-delay: 0.2s">
                    <div class="bg-white rounded-xl p-6 border border-[#e6f4ef] shadow-sm">
                        <div class="text-[#46a080] text-sm font-medium mb-1">Accuracy</div>
                        <div class="text-[#0c1c17] text-3xl font-bold" id="stat-accuracy">0%</div>
                        <div class="w-full bg-[#e6f4ef] rounded-full h-2 mt-2">
                            <div id="accuracy-bar" class="bg-[#019863] h-2 rounded-full transition-all"
                                style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl p-6 border border-[#e6f4ef] shadow-sm">
                        <div class="text-[#46a080] text-sm font-medium mb-1">Questions Answered</div>
                        <div class="text-[#0c1c17] text-3xl font-bold" id="stat-answered">0</div>
                    </div>
                    <div class="bg-white rounded-xl p-6 border border-[#e6f4ef] shadow-sm">
                        <div class="text-[#46a080] text-sm font-medium mb-1">Current Streak</div>
                        <div class="text-[#0c1c17] text-3xl font-bold" id="stat-streak">0 🔥</div>
                    </div>
                </div>

                <!-- Recent Mistakes Review -->
                <div id="mistakes-section"
                    class="hidden bg-white rounded-xl p-6 border border-[#e6f4ef] shadow-sm fade-in">
                    <h3 class="text-[#0c1c17] font-bold text-lg mb-4 flex items-center gap-2">
                        <span>📝</span> Review Recent Mistakes
                    </h3>
                    <div id="mistakes-list" class="space-y-3">
                        <!-- Populated by JS -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/student.js"></script>
</body>

</html>
